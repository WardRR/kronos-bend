        <h1>BOOKING I OSTALE INFORMACIJE</h1>
        <section class="kontakt-forma">
            <p>Ispunite obrazac i javiti ćemo vam se u najkraćem roku.</p>
            <form action="#">
                <div class="form-group">
                    <label for="ime">Vaše ime:</label> <input type="text" id="ime" name="ime" required> </div>
                
                <div class="form-group">
                    <label for="email">E-mail adresa:</label>
                    <input type="email" id="email" name="email" required> </div>

                <div class="form-group">
                    <label for="poruka">Vaša poruka:</label>
                    <textarea id="poruka" name="poruka" rows="5" required></textarea>
                </div>

                <button type="submit">Pošalji poruku</button> </form>
        </section>
    </main>
